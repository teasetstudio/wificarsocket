<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Joystick Car</title>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
}

#zone {
  width:100%;
  height:50vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

#base {
  width:200px;
  height:200px;
  background:#222;
  border-radius:50%;
  position:relative;
}

#stick {
  width:80px;
  height:80px;
  background:#2b7cff;
  border-radius:50%;
  position:absolute;
  top:60px;
  left:60px;
}

#camera {
  width:100%;
  max-width:400px;
  /* height:30vh;
  object-fit:cover; */
}
</style>
</head>

<body>

<h2 style="text-align:center;">Joystick Control</h2>

<div class="camera-container" style="text-align:center;">
  <img id="camera" src="https://fantasybypro.com/car/stream">
  <!-- <img id="camera" src="/stream"> -->
</div>

<div id="zone">
  <div id="base">
    <div id="stick"></div>
  </div>
</div>

<script>

const base = document.getElementById("base");
const stick = document.getElementById("stick");

let active = false;

let centerX = 0;
let centerY = 0;

let x = 0;
let y = 0;

// --- helpers ---
function clamp(v, min, max){
  return Math.max(min, Math.min(max, v));
}

function sendJoystick(x, y){
  fetch(`/car/cmd/x:${x.toFixed(2)},y:${y.toFixed(2)}`);
  // fetch(`/cmd/x:${x.toFixed(2)},y:${y.toFixed(2)}`);
}

// --- start ---
function start(e){
  active = true;
}

function end(){
  active = false;
  x = 0;
  y = 0;
  stick.style.transform = `translate(0px,0px)`;
  sendJoystick(0,0);
}

// --- move ---
function move(e){

  if(!active) return;

  const rect = base.getBoundingClientRect();

  let px = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  let py = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

  centerX = rect.width / 2;
  centerY = rect.height / 2;

  let dx = px - centerX;
  let dy = py - centerY;

  // radius limit
  const max = 80;

  const dist = Math.sqrt(dx*dx + dy*dy);
  if(dist > max){
    dx = dx / dist * max;
    dy = dy / dist * max;
  }

  // move stick
  stick.style.transform = `translate(${dx}px, ${dy}px)`;

  // normalize (-1 to 1)
  x = dx / max;
  y = dy / max;

  // send to server
  sendJoystick(x, y);
}

// --- events ---
base.addEventListener("mousedown", start);
base.addEventListener("touchstart", start);

window.addEventListener("mouseup", end);
window.addEventListener("touchend", end);

window.addEventListener("mousemove", move);
window.addEventListener("touchmove", move);

</script>

</body>
</html>
